<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 远程关机管理系统</title>
    <link rel="stylesheet" href="//at.alicdn.com/t/c/font_4383266_1ld3zqcxlkg.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --primary-dark: #4338ca;
            --bg-dark: #0f0f23;
            --bg-card: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            background: var(--bg-dark);
            overflow: hidden;
        }
        
        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 60%, rgba(59, 130, 246, 0.08) 0%, transparent 40%);
            animation: bgMove 20s ease-in-out infinite;
        }
        
        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }
        
        /* 网格背景 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
        }
        
        /* 左侧品牌区域 */
        .brand-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
            z-index: 2;
        }
        
        .brand-content {
            text-align: center;
            max-width: 500px;
        }
        
        .brand-logo {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 36px;
            box-shadow: 
                0 20px 40px rgba(79, 70, 229, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            position: relative;
        }
        
        .brand-logo::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            z-index: -1;
        }
        
        .brand-logo i {
            font-size: 40px;
            color: white;
        }
        
        .brand-title {
            font-size: 38px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        
        .brand-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 56px;
        }
        
        .features {
            display: flex;
            gap: 40px;
            justify-content: center;
        }
        
        .feature {
            text-align: center;
        }
        
        .feature-icon {
            width: 52px;
            height: 52px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .feature:hover .feature-icon {
            background: rgba(79, 70, 229, 0.15);
            border-color: rgba(79, 70, 229, 0.3);
            transform: translateY(-4px);
        }
        
        .feature-icon i {
            font-size: 22px;
            color: var(--primary-light);
        }
        
        .feature-text {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }
        
        /* 右侧登录区域 */
        .login-section {
            width: 480px;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 64px;
            position: relative;
            z-index: 2;
            border-left: 1px solid var(--border);
        }
        
        .login-header {
            margin-bottom: 40px;
        }
        
        .login-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        
        .login-header p {
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-muted);
            transition: color 0.2s;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .form-group input::placeholder {
            color: var(--text-muted);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.08);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
        }
        
        .input-wrapper:focus-within i {
            color: var(--primary-light);
        }
        
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .error-msg i {
            font-size: 18px;
            color: #f87171;
        }
        
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(79, 70, 229, 0.35);
        }
        
        .btn-login:hover::before {
            left: 100%;
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .footer-text {
            margin-top: 48px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        /* 响应式 */
        @media (max-width: 960px) {
            body { flex-direction: column; }
            .brand-section { padding: 40px 24px; }
            .login-section { 
                width: 100%; 
                padding: 40px 24px;
                border-left: none;
                border-top: 1px solid var(--border);
            }
            .features { gap: 24px; }
            .brand-title { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-bg"></div>
    
    <div class="brand-section">
        <div class="brand-content">
            <div class="brand-logo">
                <i class="iconfont icon-diannao"></i>
            </div>
            <h1 class="brand-title">远程关机管理系统</h1>
            <p class="brand-subtitle">安全、高效的远程设备管理解决方案<br>支持批量操作、实时监控、定时任务</p>
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">
                        <i class="iconfont icon-anquan"></i>
                    </div>
                    <div class="feature-text">安全认证</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <i class="iconfont icon-shijian"></i>
                    </div>
                    <div class="feature-text">定时任务</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">
                        <i class="iconfont icon-tuandui"></i>
                    </div>
                    <div class="feature-text">批量管理</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="login-section">
        <div class="login-header">
            <h1>欢迎回来</h1>
            <p>请登录您的管理员账户</p>
        </div>
        
        {% if error %}
        <div class="error-msg">
            <i class="iconfont icon-jinggao"></i>
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/login">
            <div class="form-group">
                <label>用户名</label>
                <div class="input-wrapper">
                    <i class="iconfont icon-yonghu"></i>
                    <input type="text" name="username" placeholder="请输入用户名" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label>密码</label>
                <div class="input-wrapper">
                    <i class="iconfont icon-mima"></i>
                    <input type="password" name="password" placeholder="请输入密码" required>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="iconfont icon-denglu" style="margin-right: 8px;"></i>登 录
            </button>
        </form>
        
        <div class="footer-text">© 2026 Remote Shutdown Manager</div>
    </div>
</body>
</html>
